<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Realtime Orders Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #333;
            transition: 0.3s;
        }

        body.dark {
            background: #121212;
            color: white;
        }

        .navbar {
            background: #2c3e50;
            color: white;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dark .navbar {
            background: #1f1f1f;
        }

        .container {
            width: 95%;
            margin: auto;
            margin-top: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .search-box input {
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .toggle-btn {
            padding: 10px 15px;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .dark .card {
            background: #1e1e1e;
        }

        .card h2 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        .big-number {
            font-size: 28px;
            font-weight: bold;
        }

        .status-connected {
            color: #2ecc71;
            font-weight: bold;
        }

        .status-disconnected {
            color: red;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        .dark table {
            background: #1e1e1e;
        }

        table th {
            background: #3498db;
            color: white;
            padding: 14px;
        }

        table td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
            font-size: 13px;
            font-weight: bold;
        }

        .pending {
            background: orange;
        }

        .shipped {
            background: #3498db;
        }

        .delivered {
            background: #2ecc71;
        }

        .activity-feed {
            margin-top: 20px;
        }

        .event {
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            animation: fadeIn 0.5s ease;
        }

        .dark .event {
            background: #1e1e1e;
        }

        .insert {
            border-left: 6px solid green;
        }

        .update {
            border-left: 6px solid orange;
        }

        .delete {
            border-left: 6px solid red;
        }

        .form-section {
            margin-top: 30px;
        }

        .form-section input,
        .form-section select {
            padding: 10px;
            margin-right: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .form-section button {
            padding: 10px 18px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        canvas {
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        .dark canvas {
            background: #1e1e1e;
        }

        @keyframes fadeIn {

            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0px);
            }
        }

    </style>

</head>

<body>

    <div class="navbar">

        <h1>Realtime Orders Dashboard</h1>

        <div id="connectionStatus"
             class="status-disconnected">

            🔴 Disconnected

        </div>

    </div>

    <div class="container">

        <div class="top-bar">

            <div class="search-box">
                <input type="text"
                       id="searchInput"
                       placeholder="Search customer/product">
            </div>

            <button class="toggle-btn"
                    onclick="toggleDarkMode()">

                🌙 Toggle Dark Mode

            </button>

        </div>

        <div class="stats">

            <div class="card">
                <h2>Total Orders</h2>
                <div class="big-number"
                     id="totalOrders">0</div>
            </div>

            <div class="card">
                <h2>Pending</h2>
                <div class="big-number"
                     id="pendingOrders">0</div>
            </div>

            <div class="card">
                <h2>Shipped</h2>
                <div class="big-number"
                     id="shippedOrders">0</div>
            </div>

            <div class="card">
                <h2>Delivered</h2>
                <div class="big-number"
                     id="deliveredOrders">0</div>
            </div>

        </div>

        <div class="card">

            <h2>Orders Table</h2>

            <table>

                <thead>

                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Product</th>
                        <th>Status</th>
                        <th>Updated At</th>
                    </tr>

                </thead>

                <tbody id="ordersBody"></tbody>

            </table>

        </div>

        <canvas id="ordersChart"></canvas>

        <div class="card activity-feed">

            <h2>Live Activity Feed</h2>

            <div id="activityFeed"></div>

        </div>

        <div class="card form-section">

            <h2>Add Order</h2>

            <input type="text"
                   id="customerName"
                   placeholder="Customer Name">

            <input type="text"
                   id="productName"
                   placeholder="Product Name">

            <select id="statusSelect">

                <option value="pending">Pending</option>
                <option value="shipped">Shipped</option>
                <option value="delivered">Delivered</option>

            </select>

            <button onclick="addFakeOrder()">

                Add Order

            </button>

        </div>

    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>

        const socket = io();

        const orders = {};

        const body =
            document.getElementById("ordersBody");

        const activityFeed =
            document.getElementById("activityFeed");

        const connectionStatus =
            document.getElementById("connectionStatus");

        const searchInput =
            document.getElementById("searchInput");

        socket.on('connect', () => {

            connectionStatus.innerHTML =
                "🟢 Connected";

            connectionStatus.className =
                "status-connected";
        });

        socket.on('disconnect', () => {

            connectionStatus.innerHTML =
                "🔴 Disconnected";

            connectionStatus.className =
                "status-disconnected";
        });

        socket.on('db_update', (payload) => {

            const operation = payload.operation;
            const data = payload.data;

            if(operation === "DELETE") {

                delete orders[data.id];

            } else {

                orders[data.id] = data;
            }

            addActivity(operation, data);

            renderTable();

            updateStats();

            updateChart();
        });

        function renderTable() {

            body.innerHTML = "";

            const search =
                searchInput.value.toLowerCase();

            Object.values(orders)

            .filter(order =>
                order.customer_name
                    .toLowerCase()
                    .includes(search)

                ||

                order.product_name
                    .toLowerCase()
                    .includes(search)
            )

            .forEach(order => {

                const row =
                    document.createElement('tr');

                row.innerHTML = `

                    <td>${order.id}</td>

                    <td>${order.customer_name}</td>

                    <td>${order.product_name}</td>

                    <td>

                        <span class="
                            status-badge
                            ${order.status}
                        ">

                            ${order.status}

                        </span>

                    </td>

                    <td>
                        ${new Date(order.updated_at)
                            .toLocaleString()}
                    </td>
                `;

                body.appendChild(row);
            });
        }

        function addActivity(operation, data) {

            const div =
                document.createElement('div');

            div.classList.add('event');

            div.classList.add(
                operation.toLowerCase()
            );

            div.innerHTML = `

                <strong>${operation}</strong>

                → Order ID ${data.id}

                (${data.product_name})

                by ${data.customer_name}

            `;

            activityFeed.prepend(div);
        }

        function updateStats() {

            const values =
                Object.values(orders);

            document.getElementById("totalOrders")
                .innerText = values.length;

            document.getElementById("pendingOrders")
                .innerText =
                    values.filter(
                        o => o.status === "pending"
                    ).length;

            document.getElementById("shippedOrders")
                .innerText =
                    values.filter(
                        o => o.status === "shipped"
                    ).length;

            document.getElementById("deliveredOrders")
                .innerText =
                    values.filter(
                        o => o.status === "delivered"
                    ).length;
        }

        searchInput.addEventListener(
            'input',
            renderTable
        );

        function toggleDarkMode() {

            document.body.classList.toggle('dark');
        }

        const ctx =
            document.getElementById('ordersChart');

        const chart =
            new Chart(ctx, {

                type: 'pie',

                data: {

                    labels: [
                        'Pending',
                        'Shipped',
                        'Delivered'
                    ],

                    datasets: [{

                        data: [0,0,0]

                    }]
                }
            });

        function updateChart() {

            const values =
                Object.values(orders);

            chart.data.datasets[0].data = [

                values.filter(
                    o => o.status === "pending"
                ).length,

                values.filter(
                    o => o.status === "shipped"
                ).length,

                values.filter(
                    o => o.status === "delivered"
                ).length
            ];

            chart.update();
        }

        function addFakeOrder() {

            const customer =
                document.getElementById("customerName")
                    .value;

            const product =
                document.getElementById("productName")
                    .value;

            const status =
                document.getElementById("statusSelect")
                    .value;

            alert(
                "Demo form added.\n\nUse PostgreSQL INSERT query for actual DB insert."
            );
        }

    </script>

</body>

</html>
